<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Behavior.txt Text Rendering Test</title>
    <script src="../../components/assets/marked.min.js"></script>
    <style>
        body { background: #1e1e1e; color: #fff; font-family: sans-serif; padding: 20px; }
        .test-case { margin: 20px 0; padding: 15px; border: 1px solid #444; }
        .input { background: #2d2d2d; padding: 10px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
        .output { background: #252525; padding: 10px; margin: 10px 0; }
        .pass { border-color: #4caf50; }
        .fail { border-color: #f44336; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Behavior.txt Text Rendering Issues</h1>
    <p>Testing messy AI streaming text from behavior.txt lines 1-98</p>
    <div id="results"></div>

<script>
function normalizeMarkdownText(text) {
    if (!text || typeof text !== 'string') return text || '';
    if (text.length > 200000) {
        text = text.replace(/\r\n/g, '\n');
        text = text.replace(new RegExp('\\n{4,}', 'g'), '\n\n\n');
        return text;
    }
    
    text = text.replace(/[\u200B\u200C\u200D\u200E\u200F\uFEFF\u2060\u00AD]/g, '');
    text = text.replace(/\r\n/g, '\n');
    text = text.replace(/\*\*\s+([^*\s])/g, '**$1');

    text = text.replace(/<\/? (?:h[1-6]|div|section|article|header|footer|nav|aside|main|figure|figcaption|details|summary)(?:\s[^>]*)?>\s*/gi, '\n');
    text = text.replace(/\s+(?:id|class|style|data-[\w-]+)\s*=\s*"[^"]*"/gi, '');
    text = text.replace(/\s+(?:id|class|style|data-[\w-]+)\s*=\s*'[^']*'/gi, '');
    
    text = text.replace(/<[^>\n]*\n[^>]*>/g, '');

    text = text.replace(/^\s*[\u2022\u25E6\u25AA\u2023\u25CF\u25CB]\s*/gm, '- ');

    text = text.replace(/^\s*\u2192\s*>/gm, '> ');
    text = text.replace(/^\s*\u2192\s+(?=[^\s>])/gm, '- ');
    text = text.replace(/^>([^\s>])/gm, '> $1');
    text = text.replace(/^([^\n>]+)>\s+([A-Z])/gm, '$1\n> $2');
    text = text.replace(/^>\s{2,}/gm, '> ');

    text = text.replace(/([\u{1F300}-\u{1F9FF}])([A-Za-z0-9])/gu, '$1 $2');
    text = text.replace(/([A-Za-z0-9])([\u{1F300}-\u{1F9FF}])/gu, '$1 $2');
    
    // Fix bold text merged with following text: "**text**word" -> "**text** word"
    text = text.replace(/(\*\*[^*]+\*\*)([A-Za-z])/g, '$1 $2');
    
    // Fix bold text merged with preceding text: "word**text**" -> "word **text**"
    text = text.replace(/([A-Za-z0-9])(\*\*)/g, '$1 $2');
    
    // Fix words merged inside bold: "** Reactstill" -> "**React** still"
    // ONLY split if there's a clear word boundary (CamelCase or word+number+word)
    // DON'T split single words like "Framework", "Trends", "Reactstill"
    
    // Split CamelCase: "ReactStill" -> "React** Still"
    text = text.replace(/\*\*\s*([A-Za-z]+?)([A-Z][a-z]{2,})/g, '**$1** $2');
    
    // Split word+number+word: "Vue 3is" -> "Vue 3** is"
    text = text.replace(/\*\*\s*([A-Za-z]+\s*\d+)([A-Z]?[a-z]+)/g, '**$1** $2');
    
    // Fix list items merged with bold: "**Pros:**-" -> "**Pros:** -"
    text = text.replace(/(\*\*)([-•])\s+/g, '$1 $2 ');
    
    // Fix AI merging year with number: "20251." -> "2025 1."
    text = text.replace(/(\d{4})(\d+\.)/g, '$1 $2');
    
    // CRITICAL: Clean up malformed bold markers
    // ONLY remove spaces INSIDE bold markers, not outside
    // "** text **" -> "**text**" (inside spaces removed)
    text = text.replace(/\*\*\s+([^*]+?)\s+\*\*/g, '**$1**');
    text = text.replace(/\*\*\s+([^*]+?)\*\*/g, '**$1**');
    text = text.replace(/\*\*([^*]+?)\s+\*\*/g, '**$1**');
    
    // Strip UNMATCHED ** markers (no pair found)
    // Count ** occurrences, if odd number, remove the orphan
    var boldCount = (text.match(/\*\*/g) || []).length;
    if (boldCount % 2 !== 0) {
        // Odd number - remove the last orphaned **
        text = text.replace(/\*\*([^*]*)$/gm, '$1');
    }

    text = text.replace(/^(?!.*\|)(#{1,6})([^#\s])/gm, '$1 $2');
    text = text.replace(/^(?!.*\|)([^\s])(#{1,6})$/gm, '$1 $2');

    text = text.replace(/^(\s*\d+)\)\s+/gm, '$1. ');

    text = text.replace(/([:.])\s+(\|[^|]+\|[^|]*\|)/g, '$1' + '' + '$2');
    text = text.replace(/(\|[^\n|]+\|)\s*\|\s*(\|-{3,})/g, '$1\n$2');
    text = text.replace(/(\|[^|]+\|)\s*\|\|\|\s*([^|])/g, '$1\n| $2');
    text = text.replace(/(\|[^|]+\|)\s*\|\|\s*(\|?[^|])/g, function(match, before, after) {
        if (after.trim().match(/^[A-Za-z*\[]/)) {
            return before + '\n| ' + after.replace(/^\|\s*/, '');
        }
        return match;
    });
    text = text.replace(/^([^|\n]+)\|\s*([A-Za-z])/gm, '$1\n| $2');
    text = text.replace(/^(\|[^|]+\|)\s*(\|-{3,})/gm, '$1\n$2');
    text = text.replace(/^(?!\|)([^|\n]+\|[^|\n]*)$/gm, '| $1');
    text = text.replace(/^\|([^|\n]+[^|\n\s])$/gm, '|$1 |');
    text = text.replace(/\|\s*([^|]+?)\s*\|/g, function(match, cell) {
        return '| ' + cell.trim() + ' |';
    });
    text = text.replace(/^(\|[^|]+\|)\n(\|[^|]+\|)$/gm, function(match, header, content) {
        var colCount = (header.match(/\|/g) || []).length - 1;
        var separator = '|' + Array(colCount + 1).join(' --- |');
        return header + '\n' + separator + '\n' + content;
    });
    text = text.replace(/^\|(?:\s*---*\s*\|)+\s*$/gm, function(match) {
        var colCount = (match.match(/\|/g) || []).length - 1;
        return '|' + Array(colCount + 1).join(' --- |');
    });

    text = text.replace(/(\|[^\n|]+\|)\s*\|\s*(\|?-+[\s\|]*)/g, function(m, h, s) {
        if (s.includes('-')) return h + '\n' + s;
        return m;
    });
    text = text.replace(/(\|[^\n|]+\|)\s*\|\|\|\s*/g, '$1\n| ');
    text = text.replace(/^\|\s*\|\s*\|/gm, '|  |  |');
    text = text.replace(/(\|[^\n]+?)\s+\|\s+\|\s+([A-Za-z])/g, '$1 |\n| $2');
    
    var hasPipes = text.includes('|');
    var tabLines = [];
    var tabLineIndices = [];
    var tempLines = text.split('\n');
    for (var ti = 0; ti < tempLines.length; ti++) {
        if (tempLines[ti].includes('\t') && tempLines[ti].split('\t').length >= 3 && !tempLines[ti].includes('|')) {
            tabLines.push(tempLines[ti]);
            tabLineIndices.push(ti);
        }
    }
    if (tabLines.length >= 3 || (tabLines.length >= 2 && hasPipes)) {
        for (var ti = 0; ti < tabLines.length; ti++) {
            var idx = tabLineIndices[ti];
            var parts = tabLines[ti].split('\t');
            var cols = parts.map(c => c.trim());
            tempLines[idx] = '| ' + cols.join(' | ') + ' |';
        }
        text = tempLines.join('\n');
    }
    text = text.replace(/^(?:---+\s*)+(?:\t(?:---+\s*))+$/gm, function(match) {
        var parts = match.split('\t');
        return '|' + parts.map(p => ' --- ').join('|') + '|';
    });
    tempLines = text.split('\n');
    var pipeLines = [];
    var result = [];
    for (var i = 0; i < tempLines.length; i++) {
        if (tempLines[i].trim().startsWith('|') && tempLines[i].includes('|') && !tempLines[i].includes('---')) {
            pipeLines.push(tempLines[i]);
            if (pipeLines.length === 1 && i + 1 < tempLines.length && tempLines[i+1].trim().startsWith('|') && !tempLines[i+1].includes('---')) {
                var colCount = (pipeLines[0].match(/\|/g) || []).length - 1;
                var sep = '|' + Array(colCount + 1).join(' --- |');
                result.push(pipeLines[0]);
                result.push(sep);
                pipeLines = [];
            }
        } else {
            if (pipeLines.length > 0) {
                result = result.concat(pipeLines);
                pipeLines = [];
            }
            result.push(tempLines[i]);
        }
    }
    if (pipeLines.length > 0) result = result.concat(pipeLines);
    text = result.join('\n');
    text = text.replace(/(\|[^|]+\|)\s*-+\s*$/gm, '$1');
    text = text.replace(new RegExp('\\n{4,}', 'g'), '\n\n\n');

    return text;
}

const testCases = [
    { 
        id: "BT1", 
        name: "Bold merged with preceding: '** Cheat Sheet**'", 
        input: "** Framework Choice Cheat Sheet**",
        expectPass: true,
        check: function(output, html) {
            // Should strip unmatched ** and show clean text
            return !html.includes('**') && html.includes('Framework Choice Cheat Sheet');
        }
    },
    { 
        id: "BT2", 
        name: "Year merged: '20251.'", 
        input: "** Trends in 20251. ** Reactstill",
        expectPass: true,
        check: function(output, html) {
            // Should have: "2025 1." with space, no ** in HTML
            const hasYearFix = output.includes('2025 1.');
            const noBoldMarkers = !html.includes('**');
            return hasYearFix && noBoldMarkers;
        }
    },
    { 
        id: "BT3", 
        name: "Word merged: 'Reactstill'", 
        input: "** Reactstill dominates but ** Next.js**is becoming",
        expectPass: true,
        check: function(output, html) {
            // ** markers should be stripped from HTML
            // Spaces may be missing (known limitation)
            return !html.includes('**') && html.includes('Reactstill');
        }
    },
    { 
        id: "BT4", 
        name: "List with bold: '**Pros:**-'", 
        input: "**✅ Pros:**- ** Fine-grained reactivity**(faster).",
        expectPass: true,
        check: function(output, html) {
            // ** markers should be stripped, content visible
            return !html.includes('**') && html.includes('Pros') && html.includes('Fine-grained');
        }
    },
    { 
        id: "BT5", 
        name: "Broken HTML: '<template\\n>'", 
        input: "<template\n> Hello, Nuxt.js!\n</template>",
        expectPass: true,
        check: function(output) {
            // Should remove broken <template\n> tag
            return !output.includes('<template\n>') && !output.includes('<template');
        }
    },
    { 
        id: "BT6", 
        name: "Multiple merges", 
        input: "** Vue 3is improving but ** Svelteis gaining",
        expectPass: true,
        check: function(output, html) {
            // Should split: **Vue 3** is, **Svelte** is
            // HTML should NOT show raw ** with merged words
            const hasProperBold = output.includes('**Vue 3') || output.includes('Vue 3**');
            const noRawMarkers = !html.includes('**Vue 3is') && !html.includes('**Svelteis');
            return hasProperBold && noRawMarkers;
        }
    },
    { 
        id: "BT7", 
        name: "Emoji with bold", 
        input: "**✅ Pros:**- ** Fine-grained**",
        expectPass: true,
        check: function(output, html) {
            // Should clean up and show without **
            return !html.includes('**') && html.includes('Pros');
        }
    },
    { 
        id: "BT8", 
        name: "Real behavior.txt line 4", 
        input: "** Trends in 20251. ** Reactstill dominates but ** Next.js**is becoming the go-to for full-stack.",
        expectPass: true,
        check: function(output, html) {
            // Year fix: 2025 1., no ** in HTML
            const hasYearFix = output.includes('2025 1.');
            const noBoldMarkers = !html.includes('**');
            return hasYearFix && noBoldMarkers;
        }
    }
];

function runTests() {
    const results = document.getElementById('results');
    let passCount = 0;
    let failCount = 0;
    
    testCases.forEach(test => {
        const normalized = normalizeMarkdownText(test.input);
        const html = marked.parse(normalized);
        
        const passed = test.check(normalized, html);
        if (passed) passCount++;
        else failCount++;
        
        const div = document.createElement('div');
        div.className = 'test-case ' + (passed ? 'pass' : 'fail');
        div.innerHTML = `
            <h3>${test.id}. ${test.name} ${passed ? '✓ PASS' : '✗ FAIL'}</h3>
            <div><strong>Status:</strong> ${passed ? 'PASSED' : 'FAILED'}</div>
            <div><strong>Input:</strong></div>
            <div class="input">${test.input.replace(/</g, '&lt;').replace(/\n/g, '\\n')}</div>
            <div><strong>Normalized Output:</strong></div>
            <div class="input">${normalized.replace(/</g, '&lt;').replace(/\n/g, '\\n')}</div>
            <div><strong>Rendered HTML:</strong></div>
            <div class="output">${html}</div>
        `;
        results.appendChild(div);
    });
    
    // Add summary
    const summary = document.createElement('div');
    summary.style.cssText = 'position: fixed; top: 10px; right: 10px; background: #333; padding: 15px; border-radius: 5px;';
    summary.innerHTML = `
        <h3 style="margin: 0 0 10px 0;">Test Summary</h3>
        <div style="color: #4caf50;">✓ PASS: ${passCount}</div>
        <div style="color: #f44336;">✗ FAIL: ${failCount}</div>
        <div style="margin-top: 5px;">Total: ${testCases.length}</div>
    `;
    document.body.appendChild(summary);
}

runTests();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cortex Terminal</title>
    <!-- Load xterm.js styles and scripts locally -->
    <link rel="stylesheet" href="assets/xterm/xterm.css" />
    <script src="assets/xterm/xterm.js"></script>
    <script src="assets/xterm/xterm-addon-fit.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0c0c0c; /* Default dark mode background */
            overflow: hidden;
            font-family: 'Cascadia Code', 'Consolas', monospace;
        }
        #terminal-container {
            width: 100%;
            height: 100%;
            padding: 4px;
            box-sizing: border-box;
        }
        .xterm-viewport::-webkit-scrollbar {
            width: 10px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #4f4f4f;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script>
        // Initialize xterm.js
        const term = new Terminal({
            fontFamily: "'Cascadia Code', 'Consolas', monospace",
            fontSize: 13,
            cursorBlink: true,
            theme: {
                background: '#0c0c0c',
                foreground: '#cccccc',
                black: '#0c0c0c',
                red: '#c50f1f',
                green: '#13a10e',
                yellow: '#c19c00',
                blue: '#0037da',
                magenta: '#881798',
                cyan: '#3a96dd',
                white: '#cccccc',
                brightBlack: '#767676',
                brightRed: '#e74856',
                brightGreen: '#16c60c',
                brightYellow: '#f9f1a5',
                brightBlue: '#3b78ff',
                brightMagenta: '#b4009e',
                brightCyan: '#61d6d6',
                brightWhite: '#f2f2f2'
            }
        });

        // Load the Fit addon so it automatically resizes to the container
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        // Open the terminal in the container
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        // Handle window resizing
        window.addEventListener('resize', () => {
            fitAddon.fit();
            if (window.pyTerminal) {
                // Notify python of the new dimensions
                window.pyTerminal.resize(term.cols, term.rows);
            }
        });

        // Handle custom keyboard shortcuts (Copy & Paste)
        term.attachCustomKeyEventHandler(e => {
            if (e.type === 'keydown') {
                if (e.ctrlKey && e.code === 'KeyC') {
                    if (term.hasSelection()) {
                        if (window.pyTerminal) {
                            window.pyTerminal.copy_to_clipboard(term.getSelection());
                        }
                        term.clearSelection();
                        return false; 
                    }
                } else if (e.ctrlKey && e.code === 'KeyV') {
                    if (window.pyTerminal) {
                        window.pyTerminal.paste_from_clipboard();
                    }
                    return false;
                }
            }
            return true;
        });

        // Handle right-click (Copy if selection exists, Paste otherwise)
        document.getElementById('terminal-container').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (window.pyTerminal) {
                if (term.hasSelection()) {
                    window.pyTerminal.copy_to_clipboard(term.getSelection());
                    term.clearSelection();
                } else {
                    window.pyTerminal.paste_from_clipboard();
                }
            }
        });

        // Initialize QWebChannel bridge
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window.pyTerminal = channel.objects.pyTerminal;
            
            // Initial resize event to Python
            window.pyTerminal.resize(term.cols, term.rows);

            // When user types in xterm, send to Python
            term.onData(data => {
                window.pyTerminal.receive_input(data);
            });
            
            // Connect Python -> JS (incoming text from stdout)
            window.pyTerminal.send_output.connect(function(text) {
                term.write(text);
            });
            
            // Connect Python -> JS (theme update)
            window.pyTerminal.update_theme.connect(function(is_dark) {
                if (is_dark) {
                    document.body.style.backgroundColor = '#0c0c0c';
                    term.options.theme = {
                        background: '#0c0c0c',
                        foreground: '#cccccc',
                        cursor: '#ffffff'
                    };
                } else {
                    document.body.style.backgroundColor = '#ffffff';
                    term.options.theme = {
                        background: '#ffffff',
                        foreground: '#0c0c0c',
                        cursor: '#000000',
                        black: '#000000',
                        red: '#cd3131',
                        green: '#00bc00',
                        yellow: '#949800',
                        blue: '#0451a5',
                        magenta: '#bc05bc',
                        cyan: '#0598bc',
                        white: '#555555',
                        brightBlack: '#666666',
                        brightRed: '#cd3131',
                        brightGreen: '#14ce14',
                        brightYellow: '#b5ba00',
                        brightBlue: '#0451a5',
                        brightMagenta: '#bc05bc',
                        brightCyan: '#0598bc',
                        brightWhite: '#a5a5a5'
                    };
                }
            });
            
            // Let Python know we are ready
            window.pyTerminal.ready();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cortex Terminal</title>
    <!-- Load xterm.js locally -->
    <link rel="stylesheet" href="assets/xterm/xterm.css" />
    <script src="assets/xterm/xterm.js"></script>
    <script src="assets/xterm/xterm-addon-fit.js"></script>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0c0c0c;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            overflow: hidden;
        }
        
        /* CRITICAL: Hide any native scrollbars from QWebEngineView - only show xterm scrollbar */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
        }
        
        #terminal-container {
            width: 100%;
            height: 100%;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Allow xterm to fill container */
        .xterm {
            width: 100%;
            height: 100%;
        }
        
        /* ===== WEBKIT SCROLLBAR STYLING - VS CODE STYLE ===== */
        .xterm .xterm-viewport::-webkit-scrollbar {
            width: 12px;
        }
        
        .xterm .xterm-viewport::-webkit-scrollbar-track {
            background: #0c0c0c;  /* Match dark terminal background */
        }
        
        body.light-mode .xterm .xterm-viewport::-webkit-scrollbar-track {
            background: #ffffff;  /* Match light terminal background */
        }
        
        /* Scrollbar thumb - VS Code style metallic gray */
        .xterm .xterm-viewport::-webkit-scrollbar-thumb {
            background: #79797966;  /* Metallic gray with transparency */
            border-radius: 6px;
        }
        
        .xterm .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #797979cc;  /* More opaque when hovered */
        }
        
        .xterm .xterm-viewport::-webkit-scrollbar-thumb:active {
            background: #797979ff;
        }
        
        /* Light mode scrollbar */
        body.light-mode .xterm .xterm-viewport::-webkit-scrollbar-thumb {
            background: #00000033;  /* Dark black with transparency */
        }
        
        body.light-mode .xterm .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #00000066;  /* Darker on hover */
        }
        
        body.light-mode .xterm .xterm-viewport::-webkit-scrollbar-thumb:active {
            background: #000000cc;
        }
    </style>
</head>
<body>
    <div id="loading-message" style="color: #00ff00; padding: 20px; background: #0c0c0c;">Terminal loading...</div>
    <div id="terminal-container"></div>
    <div id="error-message" style="color: red; padding: 20px; display: none;"></div>
    <script>
        // Store logs until pyTerminal is available
        let logQueue = [];
        const originalLog = console.log;
        const originalError = console.error;
        
        function flushLogQueue() {
            if (window.pyTerminal && logQueue.length > 0) {
                logQueue.forEach(msg => window.pyTerminal.js_log(msg));
                logQueue = [];
            }
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const msg = '[LOG] ' + args.join(' ');
            if (window.pyTerminal) {
                window.pyTerminal.js_log(msg);
            } else {
                logQueue.push(msg);
            }
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            const msg = '[ERROR] ' + args.join(' ');
            if (window.pyTerminal) {
                window.pyTerminal.js_log(msg);
            } else {
                logQueue.push(msg);
            }
        };
        
        console.log('[TERMINAL] Script starting...');
        console.log('[TERMINAL] qt.webChannelTransport available:', typeof qt !== 'undefined' && qt.webChannelTransport);
        console.log('[TERMINAL] QWebChannel available:', typeof QWebChannel !== 'undefined');
        
        // Check if xterm.js loaded
        if (typeof Terminal === 'undefined') {
            console.error('[TERMINAL] ERROR: Terminal class not found!');
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-message').textContent = 'Error: xterm.js failed to load. Terminal class not found.';
        } else {
            console.log('[TERMINAL] Terminal class found, initializing...');
        }
        
        // Hide loading message
        document.getElementById('loading-message').style.display = 'none';
        
        // Initialize xterm.js with performance optimizations
        let term;
        try {
            term = new Terminal({
                fontFamily: "'Cascadia Code', 'Consolas', monospace",
                fontSize: 13,
                cursorBlink: true,
                // PERFORMANCE: Limit scrollback to prevent memory bloat
                scrollback: 5000,
                // PERFORMANCE: Disable features we don't need
                allowTransparency: false,
                fastScrollModifier: 'alt',
                // FIX: Disable local echo to prevent double-display (Python handles echoing)
                disableStdin: false,
                // FIX: Ensure terminal scrolls to bottom on new output and user input
                scrollOnUserInput: true,
                scrollOnOutput: true,
                convertEol: true,
                // Enable mouse wheel scrolling
                mouseWheelMode: 'line',
                theme: {
                    background: '#0c0c0c',
                    foreground: '#cccccc',
                    black: '#0c0c0c',
                    red: '#c50f1f',
                    green: '#13a10e',
                    yellow: '#c19c00',
                    blue: '#0037da',
                    magenta: '#881798',
                    cyan: '#3a96dd',
                    white: '#cccccc',
                    brightBlack: '#767676',
                    brightRed: '#e74856',
                    brightGreen: '#16c60c',
                    brightYellow: '#f9f1a5',
                    brightBlue: '#3b78ff',
                    brightMagenta: '#b4009e',
                    brightCyan: '#61d6d6',
                    brightWhite: '#f2f2f2'
                }
            });

        // Load the Fit addon so it automatically resizes to the container
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        // --- Custom URL Link Provider (no external CDN needed) ---
        // Uses xterm.js built-in registerLinkProvider to detect and underline URLs
        const URL_REGEX = /https?:\/\/[^\s"'>)]+/g;

        function _openUrl(url) {
            console.log('[TERMINAL] Opening URL:', url);
            if (window.pyTerminal && window.pyTerminal.open_external_url) {
                window.pyTerminal.open_external_url(url);
            } else {
                window.open(url, '_blank');
            }
        }

        try {
            if (typeof term.registerLinkProvider === 'function') {
                term.registerLinkProvider({
                    provideLinks(bufferLineNumber, callback) {
                        const line = term.buffer.active.getLine(bufferLineNumber - 1);
                        if (!line) { callback([]); return; }
                        const text = line.translateToString(true);
                        const links = [];
                        let match;
                        URL_REGEX.lastIndex = 0;
                        while ((match = URL_REGEX.exec(text)) !== null) {
                            const url = match[0];
                            const startX = match.index;
                            const endX = match.index + url.length;
                            links.push({
                                range: {
                                    start: { x: startX + 1, y: bufferLineNumber },
                                    end:   { x: endX,       y: bufferLineNumber }
                                },
                                text: url,
                                decorations: {
                                    underline: true,
                                    pointerCursor: true
                                },
                                activate(event, text) { _openUrl(text); },
                                hover(event, text) {},
                                leave(event, text) {}
                            });
                        }
                        callback(links);
                    }
                });
                console.log('[TERMINAL] Custom URL link provider registered');
            } else {
                console.warn('[TERMINAL] registerLinkProvider not available in this xterm version');
            }
        } catch (e) {
            console.error('[TERMINAL] Error registering link provider:', e);
        }
        
        // Open the terminal in the container
        term.open(document.getElementById('terminal-container'));
        
        // CRITICAL: Ensure scrollbar is visible immediately
        _ensureScrollbarVisible();
        console.log('[TERMINAL] Scrollbar visibility enforced after terminal.open()');
        
        // Wait for DOM to settle, then force scrollbar again
        setTimeout(() => {
            _ensureScrollbarVisible();
            console.log('[TERMINAL] Scrollbar re-enforced after DOM settlement');
        }, 50);
        
        fitAddon.fit();
        
        // Force scrollbar visibility after fit
        setTimeout(() => {
            _ensureScrollbarVisible();
            console.log('[TERMINAL] Scrollbar re-enforced after fitAddon.fit()');
            
            // Write initial content to ensure scrollbar appears
            // This fills the buffer so scrollbar shows even before user types
            let initialLines = Math.max(term.rows + 5, 30);  // Ensure overflow
            for (let i = 0; i < initialLines; i++) {
                term.writeln('');
            }
            term.scrollToBottom();
            _ensureScrollbarVisible();
            console.log('[TERMINAL] Initial content written to enable scrollbar');
        }, 100);

        // OPTIMIZATION 1: Resize debounce — prevents 100 resize events
        let _resizeTimer = null;
        window.addEventListener('resize', () => {
            if (_resizeTimer) clearTimeout(_resizeTimer);
            _resizeTimer = setTimeout(() => {
                fitAddon.fit();
                if (window.pyTerminal) {
                    window.pyTerminal.resize(term.cols, term.rows);
                }
                _resizeTimer = null;
            }, 100);   // debounce 100ms — not every pixel change
        });

        // OPTIMIZATION 2: Write queue with requestAnimationFrame — prevents bridge flooding
        let _writeQueue = [];
        let _rafId = null;
        const _MAX_BATCH = 65536;   // 64KB per frame max

        function _flushWrites() {
            _rafId = null;
            if (_writeQueue.length === 0) return;

            const batch = _writeQueue.join('');
            _writeQueue = [];

            if (batch.length <= _MAX_BATCH) {
                term.write(batch);
                term.scrollToBottom();
                // Ensure viewport shows scrollbar
                _ensureScrollbarVisible();
            } else {
                // Write in chunks across multiple frames to stay responsive
                term.write(batch.slice(0, _MAX_BATCH));
                term.scrollToBottom();
                let offset = _MAX_BATCH;
                function writeRest() {
                    if (offset >= batch.length) return;
                    const end = Math.min(offset + _MAX_BATCH, batch.length);
                    term.write(batch.slice(offset, end));
                    term.scrollToBottom();
                    offset = end;
                    if (offset < batch.length) requestAnimationFrame(writeRest);
                }
                requestAnimationFrame(writeRest);
                _ensureScrollbarVisible();
            }
        }
        
        function _ensureScrollbarVisible() {
            const viewport = document.querySelector('.xterm-viewport');
            if (viewport) {
                // Ensure scrollbar is visible - xterm.css may set overflow-y to auto
                // so we make sure it's set to scroll to show scrollbar even when not needed
                if (viewport.style.overflowY !== 'scroll') {
                    viewport.style.overflowY = 'scroll';
                }
            }
        }

        function writeToTerm(text) {
            _writeQueue.push(text);
            if (!_rafId) {
                _rafId = requestAnimationFrame(_flushWrites);
            }
        }

        // OPTIMIZATION 3: Input handling - prevent local echo
        let _inputBuffer = '';
        let _inputTimer = null;
        function sendInput(data) {
            _inputBuffer += data;
            if (!_inputTimer) {
                _inputTimer = setTimeout(() => {
                    if (window.pyTerminal && _inputBuffer) {
                        window.pyTerminal.receive_input(_inputBuffer);
                        _inputBuffer = '';
                    }
                    _inputTimer = null;
                }, 0);
            }
        }
        
        // CRITICAL FIX: Prevent xterm from echoing input locally
        // Python/shell will echo everything, so we block local display
        term.attachCustomKeyEventHandler((e) => {
            if (e.type === 'keydown') {
                // Let special keys through (they don't produce visible output)
                if (e.ctrlKey || e.altKey || e.metaKey || 
                    e.code.startsWith('Arrow') || e.code === 'Backspace' || 
                    e.code === 'Delete' || e.code === 'Home' || e.code === 'End') {
                    return true;
                }
                // Block printable characters from being displayed locally
                // They will be sent to Python and echoed back properly
                if (!e.ctrlKey && !e.altKey && !e.metaKey) {
                    return false;
                }
            }
            return true;
        });

        let _ignoreOnData = false;
        let _ignoreTimer = null;
        function _startIgnoreOnData() {
            _ignoreOnData = true;
            if (_ignoreTimer) {
                clearTimeout(_ignoreTimer);
            }
            _ignoreTimer = setTimeout(() => {
                _ignoreOnData = false;
                _ignoreTimer = null;
            }, 50);
        }

        function _handlePasteEvent(e) {
            if (!window.pyTerminal) {
                return;
            }
            e.preventDefault();
            e.stopPropagation();
            _startIgnoreOnData();
            window.pyTerminal.paste_from_clipboard();
        }

        if (term.textarea) {
            term.textarea.addEventListener('paste', _handlePasteEvent);
        }
        document.getElementById('terminal-container').addEventListener('paste', _handlePasteEvent, true);

        // Handle custom keyboard shortcuts (Copy & Paste & Select All)
        term.attachCustomKeyEventHandler(e => {
            if (e.type !== 'keydown') return true;

            const isCtrl = e.ctrlKey || e.metaKey;
            const isShift = e.shiftKey;
            const key = e.key.toLowerCase();

            // Ctrl+C or Ctrl+Shift+C: Copy if selection exists
            if (isCtrl && key === 'c') {
                if (term.hasSelection()) {
                    const selText = term.getSelection();
                    if (window.pyTerminal) {
                        window.pyTerminal.copy_to_clipboard(selText);
                    } else {
                        navigator.clipboard.writeText(selText);
                    }
                    term.clearSelection();
                    
                    e.preventDefault();
                    e.stopPropagation();
                    return false; // Block ^C from reaching shell
                }
                
                // If Ctrl+Shift+C is pressed but no selection, we should STILL block it 
                // to avoid sending a weird character, OR just let it through.
                // Usually Ctrl+C (no shift) is meant for SIGINT.
                if (isShift) return false; 
                
                return true; // No selection: let Ctrl+C pass through as SIGINT
            }

            // Ctrl+A: Select All
            if (isCtrl && key === 'a') {
                term.selectAll();
                e.preventDefault();
                e.stopPropagation();
                return false;
            }

            // Ctrl+V or Ctrl+Shift+V: Paste
            if (isCtrl && key === 'v') {
                if (window.pyTerminal) {
                    _startIgnoreOnData();
                    window.pyTerminal.paste_from_clipboard();
                }
                e.preventDefault();
                e.stopPropagation();
                return false;
            }

            return true;
        });

        // Handle right-click (Copy if selection exists, Paste otherwise)
        document.getElementById('terminal-container').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (window.pyTerminal) {
                if (term.hasSelection()) {
                    window.pyTerminal.copy_to_clipboard(term.getSelection());
                    term.clearSelection();
                } else {
                    window.pyTerminal.paste_from_clipboard();
                }
            }
        });

        // Initialize QWebChannel bridge - wait for qt to be ready
        function initQWebChannel() {
            if (typeof qt === 'undefined' || !qt.webChannelTransport) {
                console.log('[TERMINAL] Waiting for qt.webChannelTransport...');
                setTimeout(initQWebChannel, 100);
                return;
            }
            console.log('[TERMINAL] qt.webChannelTransport available, initializing QWebChannel...');
            new QWebChannel(qt.webChannelTransport, function(channel) {
            window.pyTerminal = channel.objects.pyTerminal;
            console.log('[TERMINAL] QWebChannel connected, pyTerminal available');
            
            // CRITICAL: Ensure scrollbar styling is applied in QWebEngineView
            _ensureScrollbarVisible();
            console.log('[TERMINAL] Scrollbar enforced in QWebChannel callback');
            
            // Flush any queued logs
            flushLogQueue();
            
            // Initial resize event to Python
            window.pyTerminal.resize(term.cols, term.rows);

            // When user types in xterm, send to Python (batched)
            term.onData(data => {
                if (_ignoreOnData) {
                    _startIgnoreOnData();
                    return;
                }
                sendInput(data);
            });
            
            // Connect Python -> JS (incoming text from stdout) — use write queue
            window.pyTerminal.send_output.connect(function(text) {
                writeToTerm(text);
            });
            
            // Connect Python -> JS (theme update) - with scrollbar color update
            window.pyTerminal.update_theme.connect(function(is_dark) {
                if (is_dark) {
                    document.body.style.backgroundColor = '#0c0c0c';
                    document.body.classList.remove('light-mode');  // Remove light mode class
                    term.options.theme = {
                        background: '#0c0c0c',
                        foreground: '#cccccc',
                        cursor: '#ffffff'
                    };
                    // Apply dark mode scrollbar color
                    const viewport = document.querySelector('.xterm-viewport');
                    if (viewport) {
                        viewport.style.setProperty('scrollbar-color', '#79797966 transparent', 'important');
                    }
                } else {
                    document.body.style.backgroundColor = '#ffffff';
                    document.body.classList.add('light-mode');  // Add light mode class
                    term.options.theme = {
                        background: '#ffffff',
                        foreground: '#0c0c0c',
                        cursor: '#000000',
                        black: '#000000',
                        red: '#cd3131',
                        green: '#00bc00',
                        yellow: '#949800',
                        blue: '#0451a5',
                        magenta: '#bc05bc',
                        cyan: '#0598bc',
                        white: '#555555',
                        brightBlack: '#666666',
                        brightRed: '#cd3131',
                        brightGreen: '#14ce14',
                        brightYellow: '#b5ba00',
                        brightBlue: '#0451a5',
                        brightMagenta: '#bc05bc',
                        brightCyan: '#0598bc',
                        brightWhite: '#a5a5a5'
                    };
                    // Apply light mode scrollbar color
                    const viewport = document.querySelector('.xterm-viewport');
                    if (viewport) {
                        viewport.style.setProperty('scrollbar-color', '#00000066 transparent', 'important');
                    }
                }
                // Ensure scrollbar is visible after theme change
                _ensureScrollbarVisible();
            });
            
            // Let Python know we are ready
            window.pyTerminal.ready();
            });
        }
        
        // Start waiting for QWebChannel
        initQWebChannel();
        } catch (e) {
            console.error('[TERMINAL] ERROR initializing terminal:', e);
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-message').textContent = 'Error initializing terminal: ' + e.message;
        }
    </script>
</body>
</html>

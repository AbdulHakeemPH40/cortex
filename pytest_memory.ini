[pytest]
testpaths = tests/memory
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src/agent/src/memdir
    --cov=src/ui/dialogs/memory_manager
    --cov=src/ui/components/ai_chat
    --cov-report=term-missing
    --cov-report=html:tests/memory/htmlcov
markers =
    p0: P0 error handling tests
    p1: P1 semantic search tests
    p2: P2 memory UI tests
    p3: P3 consolidation tests
    p4: P4 cross-project sharing tests
    integration: Integration tests
    slow: Slow running tests

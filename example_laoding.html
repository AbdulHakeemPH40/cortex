<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Installer Progress</title>

<style>
    body {
        margin: 0;
        background: #e6e6e6;
        font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .window {
        width: 700px;
        margin: 80px auto;
        background: #f3f3f3;
        padding: 20px;
        border: 1px solid #cfcfcf;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .title {
        font-size: 14px;
        margin-bottom: 20px;
    }

    .status {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
        font-size: 13px;
    }

    .progress-container {
        width: 100%;
        height: 20px;
        border: 1px solid #999;
        background: #fff;
        position: relative;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4caf50, #2e7d32);
        transition: width 0.3s ease;
    }

    .percent {
        margin-top: 8px;
        font-size: 13px;
    }

    .complete {
        margin-top: 15px;
        color: green;
        font-weight: bold;
        display: none;
    }
</style>

</head>
<body>

<div class="window">
    <div class="title">
        Please wait while the Setup Wizard installs your application.
    </div>

    <div class="status">
        <div>Status:</div>
        <div id="statusText">Initializing...</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percent" id="percentText">0%</div>

    <div class="complete" id="completeText">
        ✔ Installation Completed Successfully
    </div>
</div>

<script>
    let progress = 0;

    const bar = document.getElementById("bar");
    const percentText = document.getElementById("percentText");
    const statusText = document.getElementById("statusText");
    const completeText = document.getElementById("completeText");

    const messages = [
        "Initializing...",
        "Copying files...",
        "Installing components...",
        "Updating registry...",
        "Finalizing..."
    ];

    function updateProgress() {
        if (progress <= 100) {
            bar.style.width = progress + "%";
            percentText.textContent = progress + "%";

            // Change status based on progress stage
            if (progress < 20) statusText.textContent = messages[0];
            else if (progress < 40) statusText.textContent = messages[1];
            else if (progress < 70) statusText.textContent = messages[2];
            else if (progress < 90) statusText.textContent = messages[3];
            else statusText.textContent = messages[4];

            progress++;
        } else {
            clearInterval(interval);
            statusText.textContent = "Completed";
            completeText.style.display = "block";
        }
    }

    const interval = setInterval(updateProgress, 50);
</script>

</body>
</html>
